app:
  symbol: ◈
  title: NiCo Nightly 24GB
server:
  host: 0.0.0.0
  port: 8090
  reload: false
models:
  llm:
    base_url: http://localhost:11434/v1
    model: qwen3:4b
    api_key: ollama
  embedding:
    base_url: http://localhost:11434/v1
    model: bge-m3
    dim: 1024
    api_key: ollama
retrieval:
  query_mode: hybrid
storage:
  knowledge_store_dir: ./data/knowledge_store
  runtime_rag_dir: ./data/rag_storage
  vector_cache_dir: ./data/vector_cache
  snapshots_dir: ./data/snapshots
  global_router_dir: ./data/knowledge_store/global
versioning:
  schema_version: 0.5-nightly-24gb
  ontology_version: nornickel-metallurgy-0.1
  app_version: nico-nightly-24gb
ingestion:
  mode: topic_sharded
  topic_layout:
    enabled: true
    path_depth:
      collection_level: 1
      theme_level: 2
    default_collection: misc
    default_theme: unclassified
  batching:
    batch_size_docs: 64
    max_parallel_themes: 2
    max_parallel_docs_per_theme: 1
    stop_on_theme_error: false
  file_discovery:
    recursive: true
    include_root_files: true
    supported_extensions:
    - .pdf
    - .doc
    - .docx
    - .ppt
    - .pptx
    - .xls
    - .xlsx
    - .csv
    - .txt
    - .md
    - .html
    - .htm
    - .epub
    ignore_dirs:
    - __MACOSX
    - .git
    - node_modules
    - .venv
    - venv
    - data
    - uploads
    - __pycache__
    year_dir_pattern: ^(19|20)\d{2}$
  theme_resolution:
    strategy: hybrid
    use_path: true
    use_filename: true
    use_content_preview: true
    content_preview_chars: 9000
    min_confidence: 0.72
    auto_theme_from_filename: false
    auto_theme_from_content_terms: false
    collapse_low_confidence: true
  routing:
    top_k_themes: 8
    min_theme_score: 0.05
    fallback_to_global_chunks: true
    use_theme_embeddings: true
    explain: true
  profiles:
    nightly_stage1_24gb:
      description: 'Night Stage 1: fast durable fill; no LightRAG runtime, larger
        batches for a stronger machine.'
      build_runtime_index: false
      compute_graph_metrics_during_ingest: false
      rebuild_graph_metrics_after: false
      rebuild_theme_embeddings_after: true
      build_global_router_after: true
      batch_size_docs: 64
      status: search_ready
      search_backend: knowledge_store_lightweight
    nightly_compressed_lightrag_24gb:
      description: 'Night Stage 2: deterministic retrieval_kg fallback + compressed
        LightRAG runtime; intended for 24GB VRAM local LLM.'
      graph_mode: compressed_kg
      build_runtime_index: true
      clear_runtime: true
      wait: true
      batch_size_docs: 4
      max_parallel_themes: 2
      poll_interval: 10.0
      timeout_sec: 1800.0
      max_chunks_per_document_for_graph: 5
      min_kg_score: 0.08
      max_chunks_per_theme: 96
      max_candidate_chunks_per_theme: 1000
      compressed_dynamic_document_limits: true
      compressed_short_document_max_chunks: 3
      compressed_long_document_max_chunks: 6
      compressed_runtime_doc_mode: chunk
      compressed_doc_type_aware: true
      compressed_min_chunk_quality: 0.2
      fallback_to_lightweight_on_timeout: true
      deterministic_timeout_sec: 900.0
      rebuild_graph_metrics_after: false
      rebuild_theme_embeddings_after: true
      build_global_router_after: true
      target_status: compressed_kg_ready
    nightly_compressed_graph_24gb:
      description: 'Night Stage 2: compressed_graph = deterministic fallback + compressed
        LightRAG runtime for 24GB VRAM.'
      graph_mode: compressed_graph
      build_runtime_index: true
      clear_runtime: true
      wait: true
      batch_size_docs: 4
      max_parallel_themes: 2
      poll_interval: 10.0
      timeout_sec: 1800.0
      max_chunks_per_document_for_graph: 5
      min_kg_score: 0.08
      max_chunks_per_theme: 96
      max_candidate_chunks_per_theme: 1000
      compressed_dynamic_document_limits: true
      compressed_short_document_max_chunks: 3
      compressed_long_document_max_chunks: 6
      compressed_runtime_doc_mode: chunk
      compressed_doc_type_aware: true
      compressed_min_chunk_quality: 0.2
      fallback_to_lightweight_on_timeout: true
      deterministic_timeout_sec: 900.0
      rebuild_graph_metrics_after: false
      rebuild_theme_embeddings_after: true
      build_global_router_after: true
      target_status: compressed_kg_ready

    nightly_compressed_answerable_24gb:
      description: 'Night Stage 2 SAFE answerability profile: compressed LightRAG as chunk-vector RAG, no extraction repair/hardening; conservative selected chunks; deterministic retrieval fallback remains available.'
      graph_mode: compressed_graph
      build_runtime_index: true
      clear_runtime: true
      wait: true
      batch_size_docs: 4
      max_parallel_themes: 2
      poll_interval: 10.0
      timeout_sec: 1800.0
      max_chunks_per_document_for_graph: 4
      min_kg_score: 0.15
      max_chunks_per_theme: 32
      max_candidate_chunks_per_theme: 800
      compressed_dynamic_document_limits: true
      compressed_short_document_max_chunks: 3
      compressed_long_document_max_chunks: 6
      compressed_runtime_doc_mode: chunk
      compressed_doc_type_aware: true
      compressed_min_chunk_quality: 0.16
      lightrag_extraction_prompt_hardening: false
      lightrag_extraction_output_repair: false
      fallback_to_lightweight_on_timeout: true
      deterministic_timeout_sec: 900.0
      rebuild_graph_metrics_after: false
      rebuild_theme_embeddings_after: true
      build_global_router_after: true
      target_status: compressed_kg_ready
    nightly_retrieval_kg_24gb:
      description: 'Night Stage 2 safe mode: only deterministic retrieval_kg, no LightRAG
        runtime.'
      graph_mode: retrieval_kg
      build_runtime_index: false
      clear_runtime: false
      wait: false
      batch_size_docs: 64
      poll_interval: 10.0
      timeout_sec: 0.0
      max_chunks_per_document_for_graph: 0
      min_kg_score: 0.0
      max_chunks_per_theme: 0
      fallback_to_lightweight_on_timeout: true
      rebuild_graph_metrics_after: false
      rebuild_theme_embeddings_after: true
      build_global_router_after: true
      target_status: retrieval_kg_ready
    nightly_full_lightrag_24gb:
      description: 'Night Stage 2 exhaustive mode: full LightRAG for selected themes
        only.'
      graph_mode: full_kg
      build_runtime_index: true
      clear_runtime: false
      wait: true
      batch_size_docs: 4
      max_parallel_themes: 2
      poll_interval: 10.0
      timeout_sec: 2400.0
      fallback_to_lightweight_on_timeout: true
      rebuild_graph_metrics_after: false
      rebuild_theme_embeddings_after: true
      build_global_router_after: true
      target_status: full_kg_ready
intelligence:
  graph_metrics:
    enabled: true
    top_n: 50
    pagerank_iterations: 40
    betweenness_sample: 128
  theme_embeddings:
    enabled: true
    max_chunks_per_theme: 32
    embedding_base_url: http://localhost:11434/v1
    embedding_model: bge-m3
    embedding_dim: 1024
    embedding_api_key: ollama
rag:
  extraction_prompt_hardening: true
  extraction_output_repair: true
